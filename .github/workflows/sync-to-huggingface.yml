name: Sync to Hugging Face Space

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync-to-huggingface:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Install Hugging Face Hub
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade huggingface_hub

      - name: Validate required secrets
        run: |
          if [ -z "${{ secrets.HF_TOKEN }}" ]; then
            echo "Missing required GitHub secret: HF_TOKEN"
            exit 1
          fi
          if [ -z "${{ vars.HF_SPACE_REPO }}" ]; then
            echo "Missing required GitHub variable: HF_SPACE_REPO, example: username/yfinance-mcp-service"
            exit 1
          fi

      - name: Upload repository to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_REPO: ${{ vars.HF_SPACE_REPO }}
        run: |
          python - <<'PY'
          import os
          from huggingface_hub import HfApi

          token = os.environ["HF_TOKEN"]
          repo_id = os.environ["HF_SPACE_REPO"]

          ignore_patterns = [
              ".git/*",
              ".github/*",
              "__pycache__/*",
              "*.pyc",
              ".env",
              ".venv/*",
              "venv/*",
              ".DS_Store",
          ]

          api = HfApi(token=token)
          api.upload_folder(
              folder_path=".",
              repo_id=repo_id,
              repo_type="space",
              ignore_patterns=ignore_patterns,
              commit_message="Sync from GitHub Actions",
          )

          print(f"Synced current GitHub repository to Hugging Face Space: {repo_id}")
          PY
