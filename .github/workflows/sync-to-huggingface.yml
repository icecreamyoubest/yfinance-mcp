name: Sync to Hugging Face Space

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  sync-to-hf:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout GitHub repository
        uses: actions/checkout@v4

      - name: Validate required configuration
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_REPO_VAR: ${{ vars.HF_SPACE_REPO }}
          HF_SPACE_REPO_SECRET: ${{ secrets.HF_SPACE_REPO }}
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "Missing required GitHub secret: HF_TOKEN"
            exit 1
          fi

          HF_SPACE_REPO="${HF_SPACE_REPO_VAR:-$HF_SPACE_REPO_SECRET}"

          if [ -z "$HF_SPACE_REPO" ]; then
            echo "Missing HF_SPACE_REPO."
            echo "Set it as either:"
            echo "1. Repository Variable: HF_SPACE_REPO=username/space-name"
            echo "2. Repository Secret: HF_SPACE_REPO=username/space-name"
            exit 1
          fi

          echo "HF_SPACE_REPO=$HF_SPACE_REPO" >> "$GITHUB_ENV"

      - name: Install git-lfs
        run: |
          sudo apt-get update
          sudo apt-get install -y git-lfs
          git lfs install

      - name: Clone Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git clone https://user:${HF_TOKEN}@huggingface.co/spaces/${HF_SPACE_REPO} hf-space

      - name: Sync files to Hugging Face Space
        run: |
          rsync -av --delete \
            --exclude ".git" \
            --exclude ".github" \
            --exclude "hf-space" \
            ./ hf-space/

      - name: Commit and push to Hugging Face Space
        working-directory: hf-space
        run: |
          git config user.email "actions@github.com"
          git config user.name "github-actions"

          git add .

          if git diff --cached --quiet; then
            echo "No changes to sync."
            exit 0
          fi

          git commit -m "Sync from GitHub Actions"
          git push
